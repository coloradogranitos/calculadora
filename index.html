<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita barra de rolagem dupla */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* Remove a borda do iframe */
            /* A margem negativa abaixo "empurra" a barra do Google para fora da tela */
            margin-top: -36px; 
            height: calc(100% + 36px);
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbwVUx8p2A0UnGweHJ8QN6jeI0CLXKW8hGfjYK_2wy0_VNoHRheZkORzrF2fXz6JDyo0/exec"></iframe>
</body>
</html>
